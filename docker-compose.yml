services:
  # PostgreSQL stores guest sessions, room metadata, chat logs and hand history.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: texas_poker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Redis keeps hot room snapshots, reconnect tokens and other short-lived realtime state.
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"]

  server:
    image: ${TEXAS_POKER_SERVER_IMAGE:-ghcr.io/ykelit/texas-poker-server:latest}
    pull_policy: always
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      CLIENT_ORIGIN: http://127.0.0.1:5173
      TOKEN_SECRET: ${TOKEN_SECRET:?TOKEN_SECRET must be set}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/texas_poker
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3001"

  web:
    image: ${TEXAS_POKER_WEB_IMAGE:-ghcr.io/ykelit/texas-poker-web:latest}
    pull_policy: always
    environment:
      VITE_SERVER_ORIGIN: ${VITE_SERVER_ORIGIN:-http://server:3001}
      VITE_SOCKET_ORIGIN: ${VITE_SOCKET_ORIGIN:-}
    depends_on:
      - server
    ports:
      - "5173:5173"

volumes:
  postgres-data:
